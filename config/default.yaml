# Mark — global settings. Per-product settings live in config/products/*.yaml
# and in the `products` table once added via `mark product add`.

upload_post:
  profile_username: "my-profile"    # Your upload-post.com profile name

llm:
  text_model: "gpt-5.4-mini"            # Strategist / writer / analyzer (best value, July 2026)
  judge_model: "gpt-5.4-nano"           # Cheaper model for variant judging / scoring
  embedding_model: "text-embedding-3-small"
  variants: 1                            # Candidate drafts to generate, then judge (1 = no contest)
  self_critique: true                    # Revise drafts against the anti-slop rules before saving
  novelty_threshold: 0.93                # Cosine sim above which new content is "too similar" to recent posts
  novelty_lookback: 40                   # How many recent posts to compare against for novelty

# Per-platform settings — informed by the 2026 playbooks (docs/research/MASTER-STRATEGY.md §4)
platforms:
  tiktok:
    enabled: true
    max_posts_per_day: 2               # quality gate over volume; ≥4h spacing
    content_types: ["video", "carousel"]  # photo-mode carousels get 3-5x video reach
    optimal_times: ["11:00", "17:00", "20:00"]   # Refined over time by the bandit
    hashtag_count: 4
    privacy_level: "PUBLIC_TO_EVERYONE"
  instagram:
    enabled: true
    max_posts_per_day: 2
    content_types: ["video", "carousel", "image"]
    optimal_times: ["08:00", "12:00", "17:00"]
    hashtag_count: 5                   # hashtag walls are dead; ≤5 targeted
  x:
    enabled: true
    max_posts_per_day: 5               # 3-5 originals/day is the growth cadence
    content_types: ["image", "text", "thread", "video"]
    optimal_times: ["09:00", "11:30", "14:00", "16:30", "19:00"]
    hashtag_count: 0                   # hashtags read as spam on X in 2026
  linkedin:
    enabled: true
    max_posts_per_day: 1               # 4-5/week with 24h gaps
    content_types: ["carousel", "image", "text"]  # PDF carousels = highest-reach format; video is the worst
    optimal_times: ["08:00", "16:00"]
    hashtag_count: 3
  youtube:
    enabled: true
    max_posts_per_day: 1
    content_types: ["video"]
    optimal_times: ["12:00", "17:00"]
  bluesky:
    enabled: true
    max_posts_per_day: 1               # token presence; ≤1/day, text-first
    content_types: ["text"]            # NEVER AI media here — blocklists are permanent
    optimal_times: ["10:00"]
    hashtag_count: 0
  threads:
    enabled: true
    max_posts_per_day: 3               # 2-3/day, conversation-ranked
    content_types: ["text", "image"]
    optimal_times: ["10:00", "14:00", "19:00"]
    hashtag_count: 0

media:
  image_model: "gpt-image-1.5"          # OpenAI image model (flagship, July 2026)
  image_quality: "medium"                # "low", "medium", "high"
  video_model: "fal-ai/kling-video/v3/standard/text-to-video"   # ~$0.13/s w/ audio — best value
  video_fallback: "fal-ai/wan/v2.7/text-to-video"               # $0.10/s fallback
  video_i2v_model: "fal-ai/kling-video/v3/standard/image-to-video"  # character-consistent video
  video_duration: 8                      # seconds
  video_resolution: "720p"
  tts_provider: "openai"                 # "openai" or "elevenlabs"
  tts_model: "gpt-4o-mini-tts"           # ~$0.015/min, supports delivery instructions
  tts_voice: "onyx"

scheduling:
  timezone: "America/Los_Angeles"
  content_generation_cron: "0 6 * * *"        # Generate content daily at 6am
  analytics_collection_cron: "0 */6 * * *"     # Collect analytics every 6 hours
  trend_monitoring_cron: "0 */3 * * *"         # Monitor trends every 3h — trend windows are short
  feedback_loop_cron: "0 0 * * 0"              # Weekly feedback loop analysis
  posting_jitter_minutes: 15                   # +/- random jitter on scheduled posting times

humor:
  enabled: true
  candidates: 6                # Scaffolded joke candidates per piece (full humor)
  candidates_light: 3          # Candidates when a strategy wants only light humor
  min_violation: 0.5           # BVT gate — below this the joke is bland corporate safety
  min_benignness: 0.5          # BVT gate — below this the joke punches wrong
  predictability_filter: true  # Kill jokes whose punchline can be guessed from the setup
  model: ""                    # Override model for humor generation ("" = llm.text_model)

trends:
  auto_react: false            # Draft trend-riding content the moment a hot trend appears
  react_threshold: 0.55        # Min trend_score (relevance × popularity) to count as "hot"
  min_velocity: 0.0            # Skip falling trends (late meme = brand cringe)
  max_reactions_per_day: 2     # Per product — don't trend-jack everything
  react_platforms: []          # [] = all enabled platforms
  fast_poll_minutes: 30        # Reddit rising / Bluesky / Google RSS poll interval
  subreddits:                  # Niche subs: early trend signal AND content material
    - recruitinghell
    - internships
    - jobs
    - csMajors
    - cscareerquestions
    - college

approval:
  auto_approve: false                    # Set true once you trust the output
  auto_approve_types: []                 # Content types to auto-approve, e.g. ["text"]
